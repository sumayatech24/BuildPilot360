# Render Blueprint — full-stack BuildPilot360 on the free tier.
# Provisions: managed PostgreSQL + the FastAPI API (Docker) + the web app (static, pointed at
# the real API). The API auto-creates tables and seeds the blueprint catalog on first boot.
#
# Deploy: render.com -> New -> Blueprint -> connect this repo -> Apply.

databases:
  - name: buildpilot360-db
    plan: free
    databaseName: buildpilot360
    user: buildpilot360

services:
  # --- API (FastAPI + SQLModel, Docker) ---
  - type: web
    name: buildpilot360-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buildpilot360-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ON_START
        value: "true"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: CORS_ORIGINS
        value: https://buildpilot360-web.onrender.com,https://sumayatech24.github.io
      - key: SEED_OWNER_EMAIL
        value: owner@buildpilot360.dev
      - key: SEED_OWNER_PASSWORD
        sync: false   # set your own owner password in the Render dashboard

  # --- Web (React build, talks to the API above) ---
  - type: web
    name: buildpilot360-web
    runtime: static
    buildCommand: npm install --no-audit --no-fund && npm run build --workspace @buildpilot360/web
    staticPublishPath: ./apps/web/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://buildpilot360-api.onrender.com
      - key: ELECTRON_SKIP_BINARY_DOWNLOAD
        value: "1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
